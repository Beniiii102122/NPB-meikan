<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB 選手名鑑 - メンテナンス</title>
    <style>
        body { 
            background-color: #f4f4f4; 
            font-family: sans-serif;
            color: #333; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- メンテナンス専用スタイル --- */
        .maintenance-container {
            text-align: center;
            padding: 40px 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 90%;
        }

        h1 { 
            color: #d32f2f; 
            font-size: 24px;
            margin-bottom: 15px; 
        }

        p { 
            line-height: 1.6; 
            font-size: 16px;
            color: #666;
        }

        .icon {
            font-size: 50px;
            margin-top: 20px;
            display: block;
        }

        /* 通常時はコンテンツを隠す */
        #main-content { display: none; }
    </style>
</head>
<body>

    <div id="maintenance-screen" class="maintenance-container">
        <h1>定期メンテナンス中</h1>
        <p>毎週月曜 13:00 〜 23:00 は<br>データ更新のためメンテナンスを実施します。</p>
        <span class="icon">⚾</span>
    </div>

    <script>
        function checkMaintenance() {
            const now = new Date();
            const day = now.getDay(); // 0:日, 1:月, 2:火...
            const hour = now.getHours();

            // 月曜日(1) かつ 13時以降 かつ 23時未満
            if (day === 1 && hour >= 13 && hour < 23) {
                return true;
            }
            return false;
        }

        function init() {
            if (!checkMaintenance()) {
                // メンテナンス時間外であれば、本来の名鑑サイト（別URLや元のファイル）へリダイレクト
                // もしくは、ここに元の全コードのロジックを戻すことも可能です。
                // 現在はこのHTML自体が「メンテナンス専用」の表示になっています。
                
                // もしメンテナンス中以外は普通に使わせたい場合は、
                // window.location.href = 'main.html'; などのリダイレクトを推奨します。
            }
        }

        init();
    </script>
</body>
</html>
