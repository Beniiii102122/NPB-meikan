<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨時メンテナンス中 | NPB 選手名鑑</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .maintenance-container {
            background: #fff;
            padding: 40px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            border-top: 5px solid #333;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 20px;
        }
        p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="icon">🛠️</div>
        <h1>臨時メンテナンスのお知らせ</h1>
        <p>
            ただいま、より快適にご利用いただくため、<br>
            システムの臨時メンテナンスを実施しております。
        </p>
        <p style="font-weight: bold; margin-top: 20px; color: #111;">
            しばらくお待ちください。
        </p>
    </div>

</body>
</html>
